<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芝秀月嫂 - 內容管理面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="bg-gray-50">

    <!-- 導覽列 -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">
                <i class="fa-solid fa-sliders text-green-600 mr-2"></i>
                內容管理面板
            </h1>
            <div class="flex gap-3">
                <a href="index.html" target="_blank" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                    <i class="fa-solid fa-arrow-up-right-from-square mr-2"></i>查看官網
                </a>
                <button id="saveBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                    <i class="fa-solid fa-floppy-disk mr-2"></i>保存所有更改
                </button>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="max-w-7xl mx-auto p-4 md:p-8">

        <!-- 標籤頁 -->
        <div class="flex flex-wrap gap-2 mb-6 border-b border-gray-200">
            <button class="tab-btn active px-4 py-3 font-medium text-green-600 border-b-2 border-green-600" data-tab="services">
                <i class="fa-solid fa-briefcase mr-2"></i>服務項目
            </button>
            <button class="tab-btn px-4 py-3 font-medium text-gray-600 hover:text-gray-800" data-tab="testimonials">
                <i class="fa-solid fa-quote-left mr-2"></i>客戶見證
            </button>
            <button class="tab-btn px-4 py-3 font-medium text-gray-600 hover:text-gray-800" data-tab="hero">
                <i class="fa-solid fa-image mr-2"></i>首屏文案
            </button>
            <button class="tab-btn px-4 py-3 font-medium text-gray-600 hover:text-gray-800" data-tab="availability">
                <i class="fa-solid fa-calendar mr-2"></i>檔期狀態
            </button>
        </div>

        <!-- 服務項目頁面 -->
        <div id="services" class="tab-content">
            <div class="bg-white p-6 rounded-lg shadow-sm mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fa-solid fa-briefcase text-green-600 mr-2"></i>服務項目管理
                </h2>
                
                <div id="servicesList" class="space-y-6">
                    <!-- 動態生成 -->
                </div>

                <button id="addServiceBtn" class="mt-6 w-full py-3 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 font-medium border-2 border-dashed border-green-300">
                    <i class="fa-solid fa-plus mr-2"></i>新增服務項目
                </button>
            </div>
        </div>

        <!-- 客戶見證頁面 -->
        <div id="testimonials" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow-sm mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fa-solid fa-quote-left text-green-600 mr-2"></i>客戶見證管理
                </h2>
                
                <div id="testimonialsList" class="space-y-6">
                    <!-- 動態生成 -->
                </div>

                <button id="addTestimonialBtn" class="mt-6 w-full py-3 bg-green-100 text-green-700 rounded-lg hover:bg-green-200 font-medium border-2 border-dashed border-green-300">
                    <i class="fa-solid fa-plus mr-2"></i>新增客戶見證
                </button>
            </div>
        </div>

        <!-- 首屏文案頁面 -->
        <div id="hero" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow-sm mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fa-solid fa-image text-green-600 mr-2"></i>首屏文案編輯
                </h2>
                
                <div class="space-y-4" id="heroForm">
                    <!-- 動態生成 -->
                </div>
            </div>
        </div>

        <!-- 檔期狀態頁面 -->
        <div id="availability" class="tab-content hidden">
            <div class="bg-white p-6 rounded-lg shadow-sm mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6">
                    <i class="fa-solid fa-calendar text-green-600 mr-2"></i>檔期狀態
                </h2>
                
                <div class="space-y-4" id="availabilityForm">
                    <!-- 動態生成 -->
                </div>
            </div>
        </div>

    </div>

    <!-- 成功提示 -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg hidden">
        <i class="fa-solid fa-check mr-2"></i><span id="toastMessage">已保存成功！</span>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
